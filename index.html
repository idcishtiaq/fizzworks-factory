<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FizzWorks — Factory Control (Online)</title>
<style>
  :root{
    --navy:#0E2C33;
    --navy-deep:#081B20;
    --lime:#C8E84B;
    --orange:#FF7A33;
    --cream:#F5F1E6;
    --teal-card:#15414A;
    --teal-line:#235965;
    --red:#E5564A;
    --font-display: 'Archivo Black', Arial, sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--font-body);
    background: var(--navy-deep);
    color: var(--cream);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  ::selection{ background: var(--lime); color: var(--navy-deep); }

  .app{ display:flex; min-height:100vh; }
  .sidebar{
    width: 220px;
    background: var(--navy);
    border-right: 1px solid var(--teal-line);
    padding: 24px 14px;
    position: sticky; top:0; height:100vh;
    flex-shrink:0;
    display:flex; flex-direction:column;
    transition: transform .25s ease;
    z-index: 50;
  }
  .brand{
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--lime);
    padding: 0 10px 22px 10px;
    border-bottom: 1px solid var(--teal-line);
    margin-bottom: 18px;
  }
  .brand span{ color: var(--cream); display:block; font-family: var(--font-body); font-weight:600; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:.6; margin-top:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 11px 12px; border-radius: 10px;
    color: var(--cream); opacity:.75;
    cursor:pointer; font-weight:600; font-size:14px;
    margin-bottom: 4px;
    border:none; background:none; width:100%; text-align:left;
    font-family: var(--font-body);
  }
  .nav-item .ic{ width:18px; text-align:center; font-size:15px; }
  .nav-item:hover{ opacity:1; background: var(--teal-card); }
  .nav-item.active{ opacity:1; background: var(--lime); color: var(--navy-deep); }
  .sidebar-foot{ margin-top:auto; font-size:11px; opacity:.6; padding:10px; line-height:1.6; }
  .dot{ width:7px; height:7px; border-radius:50%; background: var(--lime); display:inline-block; margin-right:5px;}
  .dot.off{ background: var(--red); }

  .main{ flex:1; padding: 28px 32px 60px; max-width: 1180px; }
  .topbar{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 26px; gap:16px; flex-wrap:wrap;}
  .topbar h1{ font-family: var(--font-display); font-size: 26px; letter-spacing:-0.5px;}
  .topbar p{ opacity:.6; font-size:13px; margin-top:4px;}
  .menu-btn{ display:none; background:var(--teal-card); border:1px solid var(--teal-line); color:var(--cream); padding:8px 12px; border-radius:8px; font-size:18px; cursor:pointer;}
  .sync-pill{ font-size:11px; padding:6px 11px; border-radius:20px; background: var(--teal-card); border:1px solid var(--teal-line); display:inline-flex; align-items:center; gap:6px; font-weight:600;}

  .grid-cards{ display:grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap:14px; margin-bottom:28px; }
  .card{
    background: var(--teal-card); border:1px solid var(--teal-line); border-radius:14px;
    padding:18px; cursor:pointer; transition: transform .15s ease, border-color .15s ease;
    position:relative; overflow:hidden;
  }
  .card:hover{ transform: translateY(-2px); border-color: var(--lime); }
  .card .label{ font-size:11px; text-transform:uppercase; letter-spacing:1.2px; opacity:.6; font-weight:600;}
  .card .value{ font-family: var(--font-display); font-size:28px; margin-top:8px; }
  .card .sub{ font-size:12px; opacity:.55; margin-top:4px; font-family: 'DM Mono', monospace;}
  .card .accent-bar{ position:absolute; left:0; top:0; bottom:0; width:4px; }

  .section-title{ font-family: var(--font-display); font-size:15px; letter-spacing:.3px; margin: 30px 0 12px; display:flex; align-items:center; gap:8px;}
  .section-title .dot{ background: var(--orange); }

  .panel-grid{ display:grid; grid-template-columns: 1fr; gap:18px; }
  @media(min-width:920px){ .panel-grid.with-form{ grid-template-columns: 380px 1fr; } }

  .form-card, .table-card{
    background: var(--teal-card); border:1px solid var(--teal-line); border-radius:14px; padding:20px;
  }
  .form-card h3, .table-card h3{ font-family: var(--font-display); font-size:14px; margin-bottom:14px; letter-spacing:.3px;}
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.8px; opacity:.6; margin: 12px 0 5px; font-weight:600;}
  label:first-of-type{ margin-top:0; }
  input, select{
    width:100%; padding:10px 11px; border-radius:8px; border:1px solid var(--teal-line);
    background: var(--navy-deep); color: var(--cream); font-size:14px; font-family: var(--font-body);
  }
  input:focus, select:focus{ outline:none; border-color: var(--lime); }
  .btn{
    margin-top:18px; width:100%; padding:12px; border-radius:9px; border:none;
    background: var(--lime); color: var(--navy-deep); font-weight:700; font-size:14px; cursor:pointer;
    font-family: var(--font-body);
  }
  .btn:disabled{ opacity:.6; cursor:wait; }
  .btn:hover:not(:disabled){ filter:brightness(1.08); }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; padding:9px 8px; opacity:.5; text-transform:uppercase; font-size:10.5px; letter-spacing:.8px; border-bottom:1px solid var(--teal-line); font-weight:600;}
  td{ padding:11px 8px; border-bottom:1px solid var(--teal-line); }
  tr:last-child td{ border-bottom:none; }
  .tbl-wrap{ overflow-x:auto; }
  .pill{ padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .pill.ok{ background: rgba(200,232,75,.18); color: var(--lime); }
  .pill.low{ background: rgba(229,86,74,.18); color: var(--red); }
  .pill.mid{ background: rgba(255,122,51,.18); color: var(--orange); }
  .del-btn{ background:none; border:none; color: var(--red); cursor:pointer; font-size:14px; opacity:.7; }
  .del-btn:hover{ opacity:1; }
  .empty{ text-align:center; padding:30px 10px; opacity:.4; font-size:13px;}

  .toast{
    position:fixed; bottom:20px; right:20px; background: var(--lime); color: var(--navy-deep);
    padding:12px 18px; border-radius:10px; font-weight:700; font-size:13px;
    transform: translateY(100px); opacity:0; transition: all .3s ease; z-index:100;
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast.err{ background: var(--red); color: var(--cream); }

  .install-hint{
    background: var(--teal-card); border:1px dashed var(--teal-line); border-radius:12px;
    padding:14px 16px; font-size:12.5px; opacity:.85; margin-bottom:24px; line-height:1.6;
  }
  .install-hint b{ color: var(--lime); }

  @media(max-width:880px){
    .sidebar{ position:fixed; left:0; transform: translateX(-100%); box-shadow: 10px 0 30px rgba(0,0,0,.4); }
    .sidebar.open{ transform: translateX(0); }
    .menu-btn{ display:inline-block; }
    .main{ padding: 20px 16px 50px; }
  }
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">FIZZWORKS<span>Factory Control · Online</span></div>
    <button class="nav-item active" data-view="dashboard"><span class="ic">◆</span> Dashboard</button>
    <button class="nav-item" data-view="sales"><span class="ic">₨</span> Sales</button>
    <button class="nav-item" data-view="purchase"><span class="ic">⇩</span> Purchase</button>
    <button class="nav-item" data-view="production"><span class="ic">⚙</span> Production</button>
    <button class="nav-item" data-view="vendors"><span class="ic">⬡</span> Vendors</button>
    <button class="nav-item" data-view="stock"><span class="ic">▣</span> Stock</button>
    <button class="nav-item" data-view="salary"><span class="ic">$</span> Salary</button>
    <div class="sidebar-foot"><span class="dot" id="syncDot"></span><span id="syncLabel">Connecting...</span></div>
  </nav>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSub">Live overview of your bottling operation</p>
        </div>
      </div>
      <div class="sync-pill"><span class="dot" id="syncDot2"></span><span id="syncLabel2">Cloud Store</span></div>
    </div>

    <div id="view-root"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ---------- DYNAMIC GLOBAL CLOUD DATA ENGINE ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyDiCFZ_UL4ZiTigq3oLiYU10YYN_XFgdq8",
  authDomain: "idc-factry.firebaseapp.com",
  databaseURL: "https://idc-factry-default-rtdb.firebaseio.com",
  projectId: "idc-factry",
  storageBucket: "idc-factry.firebasestorage.app",
  messagingSenderId: "71728674831",
  appId: "1:71728674831:web:c8cec1401858b89ee0b87a",
  measurementId: "G-BH3PZHQREV"
};

// Initialize Firebase Realtime Database Engine Library Instance
firebase.initializeApp(firebaseConfig);
const fireDb = firebase.database();

const STORES = ['sales','purchase','production','vendors','stock','salary'];

// Updated list of flavors including Milk Soda
const PRODUCT_OPTIONS = [
  "Peach",
  "Apple",
  "PineApple",
  "Lychee",
  "Imlee",
  "Lemon",
  "Alu Bukhara",
  "Blu Berry",
  "Ice Soda",
  "Guava",
  "Mint",
  "Anar",
  "Strawberry",
  "Orange",
  "Falsa",
  "Milk Soda"
];

// Updated options to exactly match your custom size labels
const SIZE_OPTIONS = [
  "Cylinder",
  "Buddy",
  "1.5L"
];

function setSyncStatus(ok) {
  document.querySelectorAll('.dot').forEach(d => d.classList.toggle('off', !ok));
  document.getElementById('syncLabel').textContent = ok ? 'Synced Live — Cloud Connected' : 'Offline Mode — Reconnecting';
  document.getElementById('syncLabel2').textContent = ok ? 'Online · Live' : 'Offline';
}

fireDb.ref(".info/connected").on("value", (snap) => {
  setSyncStatus(snap.val() === true);
});

async function addRecord(store, data) {
  const ref = fireDb.ref(store).push();
  data.id = ref.key;
  await ref.set(data);
  return data.id;
}

async function deleteRecord(store, id) {
  await fireDb.ref(`${store}/${id}`).remove();
}

async function getAll(store) {
  try {
    const snap = await fireDb.ref(store).once('value');
    const val = snap.val();
    if (!val) return [];
    
    return Object.keys(val).map(key => {
      const item = val[key];
      if (typeof item === 'object' && item !== null) {
        item.id = key;
        return item;
      }
      return { id: key, value: item };
    }).sort((a,b) => (b.id || '').localeCompare(a.id || ''));
  } catch (e) {
    console.error("Firebase read failure:", e);
    return [];
  }
}

/* ---------- format helpers ---------- */
const fmt = n => 'Rs ' + Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0});
const todayStr = ()=> new Date().toISOString().slice(0,10);
function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function statusPill(status) {
  let cls = 'mid';
  if(status === 'Paid' || status === 'Active') cls = 'ok';
  if(status === 'Pending' || status === 'Low') cls = 'low';
  return `<span class="pill ${cls}">${status || 'Pending'}</span>`;
}

/* ---------- nav navigation controls ---------- */
const titles = {
  dashboard: ['Dashboard','Live overview of your bottling operation'],
  sales: ['Sales','Record and track customer orders & dispatch'],
  purchase: ['Purchase','Raw material & packaging procurement'],
  production: ['Production','Daily batch output by flavor / line'],
  vendors: ['Vendors','Suppliers and outstanding balances'],
  stock: ['Stock','Inventory of finished goods & raw materials'],
  salary: ['Salary','Staff wages and payment history']
};

document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    document.getElementById('pageTitle').textContent = titles[v][0];
    document.getElementById('pageSub').textContent = titles[v][1];
    render(v);
    document.getElementById('sidebar').classList.remove('open');
  });
});

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

async function render(view){
  const root = document.getElementById('view-root');
  root.innerHTML = '<div class="empty">Loading current snapshot…</div>';
  if(view==='dashboard') return renderDashboard(root);
  if(view==='sales') return renderSales(root);
  if(view==='purchase') return renderPurchase(root);
  if(view==='production') return renderProduction(root);
  if(view==='vendors') return renderVendors(root);
  if(view==='stock') return renderStock(root);
  if(view==='salary') return renderSalary(root);
}

/* ---------- DASHBOARD SYSTEM ---------- */
async function renderDashboard(root){
  const [sales, purchase, production, vendors, stock, salary] = await Promise.all(STORES.map(getAll));
  const todaySales = sales.filter(s=>s.date===todayStr()).reduce((a,b)=>a+Number(b.amount||0),0);
  const todayProd = production.filter(p=>p.date===todayStr()).reduce((a,b)=>a+Number(b.qty||0),0);
  const pendingPurchase = purchase.filter(p=>p.status!=='Paid').reduce((a,b)=>a+Number(b.amount||0),0);
  const lowStock = stock.filter(s=> Number(s.qty) <= Number(s.reorderLevel||0)).length;
  const totalSalaryDue = salary.filter(s=>s.status!=='Paid').reduce((a,b)=>a+Number(b.amount||0),0);
  const vendorBalance = vendors.reduce((a,b)=>a+Number(b.balance||0),0);

  root.innerHTML = `
    <div class="install-hint">⚡ <b>Persistent Firebase System Live:</b> Data syncs automatically to secure cloud backend. Refreshing your page safely retains all entry metrics across matching worker devices instantly.</div>
    <div class="grid-cards">
      ${card('lime',"Today's Sales", fmt(todaySales), sales.length+' orders logged', 'sales')}
      ${card('orange','Production Today', todayProd.toLocaleString()+' units', production.length+' batches logged', 'production')}
      ${card('red','Pending Purchases', fmt(pendingPurchase), purchase.length+' records', 'purchase')}
      ${card(lowStock>0?'red':'lime','Low Stock Items', lowStock, stock.length+' items tracked', 'stock')}
      ${card('orange','Salary Due', fmt(totalSalaryDue), salary.length+' files', 'salary')}
      ${card('lime','Vendor Balance', fmt(vendorBalance), vendors.length+' suppliers', 'vendors')}
    </div>

    <div class="section-title">Recent Factory Activity</div>
    <div class="table-card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Date</th><th>Module</th><th>Detail</th><th>Amount</th></tr></thead>
          <tbody>${recentRows(sales,purchase,production,salary)}</tbody>
        </table>
      </div>
    </div>
  `;
  root.querySelectorAll('.card').forEach(c=> c.addEventListener('click', ()=>{
    document.querySelector('.nav-item[data-view="'+c.dataset.go+'"]').click();
  }));
}

function card(color,label,value,sub,go){
  return `<div class="card" data-go="${go}">
    <div class="accent-bar" style="background:var(--${color})"></div>
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

function recentRows(sales,purchase,production,salary){
  const items = [
    ...sales.map(s=>{
      let desc = '';
      if(s.items && Array.isArray(s.items)){
        desc = s.items.map(i => `${i.product} ${i.size || ''} (${i.qty})`).join(', ');
      } else { desc = s.product || ''; }
      return {date:s.date, module:'Sale', detail:s.customer+' — '+desc, amount:s.amount};
    }),
    ...purchase.map(p=>({date:p.date, module:'Purchase', detail:p.vendor+' — '+p.item, amount:p.amount})),
    ...production.map(p=>({date:p.date, module:'Production', detail:p.product+' batch', amount:p.qty+' units'})),
    ...salary.map(s=>({date:s.date, module:'Salary', detail:s.staffName, amount:s.amount})),
  ].sort((a,b)=> (b.date||'').localeCompare(a.date||'')).slice(0,8);
  if(!items.length) return `<tr><td colspan="4" class="empty">No records added yet.</td></tr>`;
  return items.map(i=>`<tr><td>${i.date||'-'}</td><td>${i.module}</td><td>${i.detail}</td><td>${typeof i.amount==='number'||!isNaN(i.amount)?fmt(i.amount):i.amount}</td></tr>`).join('');
}

/* ---------- SALES MODULE ---------- */
function renderSales(root) {
  root.innerHTML = `
    <div class="panel-grid with-form">
      <div class="form-card">
        <h3>Record Invoice Entry</h3>
        <form id="salesForm">
          <label>Date</label>
          <input type="date" name="date" required>

          <label>Customer Name</label>
          <input type="text" name="customer" required placeholder="e.g. Al-Madina Store">

          <div style="background: var(--navy-deep); border: 1px solid var(--teal-line); padding: 12px; border-radius: 8px; margin-top: 12px;">
            <span style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--lime); display: block; margin-bottom: 8px;">Order Cart List</span>
            <div id="cartList" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;"></div>
            <button type="button" class="btn" id="addCartRowBtn" style="margin-top: 0; padding: 6px 10px; font-size: 12px; background: transparent; border: 1px dashed var(--lime); color: var(--lime); width:100%;">
              + Add Product Item Line
            </button>
          </div>

          <label>Grand Total Amount (Rs)</label>
          <input type="number" id="salesInvoiceTotal" required readonly style="background: rgba(255,255,255,0.05); color: var(--lime); font-weight: bold;" placeholder="0">

          <label>Payment Status</label>
          <select name="status" required>
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
            <option value="Partial">Partial</option>
          </select>

          <button class="btn" type="submit" id="salesSaveBtn">Save Sale Transaction</button>
        </form>
      </div>
      <div class="table-card">
        <h3>Sales Records Log</h3>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Items Ordered</th>
                <th>Total Bill</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="salesTableBody">
              <tr><td colspan="6" class="empty">Loading entries...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const salesForm = document.getElementById('salesForm');
  salesForm.querySelector('[name="date"]').value = todayStr();

  function insertProductInput(pName = '', pSize = '', pQty = '', pPrice = '') {
    const list = document.getElementById('cartList');
    const wrapperRow = document.createElement('div');
    wrapperRow.style = "display: flex; gap: 6px; align-items: center; flex-wrap: wrap;";
    
    let productOptionsHTML = PRODUCT_OPTIONS.map(opt => `<option value="${opt}" ${opt===pName?'selected':''}>${opt}</option>`).join('');
    let sizeOptionsHTML = SIZE_OPTIONS.map(sz => `<option value="${sz}" ${sz===pSize?'selected':''}>${sz}</option>`).join('');

    wrapperRow.innerHTML = `
      <select class="c-prod" style="flex: 1.5; min-width: 90px; padding: 6px 8px; font-size: 13px;" required>
        ${productOptionsHTML}
      </select>
      <select class="c-size" style="flex: 1.2; min-width: 80px; padding: 6px 8px; font-size: 13px;" required>
        ${sizeOptionsHTML}
      </select>
      <input type="number" class="c-qty" placeholder="Cases" value="${pQty}" required style="flex: 0.9; min-width: 60px; padding: 6px 8px; font-size: 13px;">
      <input type="number" class="c-price" placeholder="Rate" value="${pPrice}" required style="flex: 1; min-width: 70px; padding: 6px 8px; font-size: 13px;">
      <button type="button" class="del-btn remove-row-action" style="padding: 0 4px;">✕</button>
    `;
    list.appendChild(wrapperRow);

    wrapperRow.querySelectorAll('input, select').forEach(inp => {
      inp.addEventListener('input', updateGrandInvoiceSum);
    });

    wrapperRow.querySelector('.remove-row-action').addEventListener('click', () => {
      wrapperRow.remove();
      updateGrandInvoiceSum();
    });
  }

  function updateGrandInvoiceSum() {
    let combinedTotal = 0;
    document.querySelectorAll('#cartList > div').forEach(row => {
      const q = Number(row.querySelector('.c-qty').value) || 0;
      const p = Number(row.querySelector('.c-price').value) || 0;
      combinedTotal += (q * p);
    });
    document.getElementById('salesInvoiceTotal').value = combinedTotal;
  }

  insertProductInput();

  document.getElementById('addCartRowBtn').addEventListener('click', () => {
    insertProductInput();
  });

  salesForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('salesSaveBtn');
    const inputRows = document.querySelectorAll('#cartList > div');
    const finalCartArray = [];
    
    inputRows.forEach(row => {
      finalCartArray.push({
        product: row.querySelector('.c-prod').value,
        size: row.querySelector('.c-size').value,
        qty: Number(row.querySelector('.c-qty').value),
        price: Number(row.querySelector('.c-price').value)
      });
    });

    if (!finalCartArray.length) {
      showToast('Add at least one product row item', true);
      return;
    }

    btn.disabled = true; btn.textContent = 'Saving…';

    const objectPayload = {
      date: salesForm.querySelector('[name="date"]').value,
      customer: salesForm.querySelector('[name="customer"]').value,
      items: finalCartArray,
      amount: Number(document.getElementById('salesInvoiceTotal').value),
      status: salesForm.querySelector('[name="status"]').value
    };

    try {
      await addRecord('sales', objectPayload);
      showToast('Sale saved safely to cloud store ✓');
      salesForm.reset();
      salesForm.querySelector('[name="date"]').value = todayStr();
      document.getElementById('cartList').innerHTML = '';
      insertProductInput();
      document.getElementById('salesInvoiceTotal').value = 0;
      loadSalesRows();
    } catch (err) {
      showToast('Network synchronization lapse', true);
    }
    btn.disabled = false; btn.textContent = 'Save Sale Transaction';
  });

  async function loadSalesRows() {
    const records = await getAll('sales');
    const tbody = document.getElementById('salesTableBody');
    if (!records.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No sales entries logged yet.</td></tr>`;
      return;
    }
    
    tbody.innerHTML = records.map(r => {
      let renderBuffer = '';
      if (r.items && Array.isArray(r.items)) {
        renderBuffer = r.items.map(i => `<div style="font-size: 12px; margin-bottom: 2px;">• ${i.product} <b>${i.size || ''}</b> <span style="opacity:0.6;">(${i.qty} cases @ ${i.price})</span></div>`).join('');
      } else {
        renderBuffer = `<div>• ${r.product || '-'} <span style="opacity:0.6;">(${r.qty || 0} cases)</span></div>`;
      }

      return `
        <tr>
          <td>${r.date || '-'}</td>
          <td style="font-weight:600;">${r.customer || '-'}</td>
          <td>${renderBuffer}</td>
          <td style="font-weight:600; color:var(--lime);">${fmt(r.amount)}</td>
          <td>${statusPill(r.status)}</td>
          <td><button class="del-btn remove-record-btn" data-id="${r.id}">✕</button></td>
        </tr>
      `;
    }).join('');

    tbody.querySelectorAll('.remove-record-btn').forEach(b => {
      b.addEventListener('click', async () => {
        try {
          await deleteRecord('sales', b.dataset.id);
          showToast('Record deleted');
          loadSalesRows();
        } catch (err) { showToast('Execution failed', true); }
      });
    });
  }

  loadSalesRows();
}

/* ---------- GENERIC BUILD ENGINE ---------- */
function genericPanel(root, opts){
  root.innerHTML = `
    <div class="panel-grid with-form">
      <div class="form-card">
        <h3>Add ${opts.title}</h3>
        <form id="entryForm">
          ${opts.fields.map(f=>fieldHTML(f)).join('')}
          <button class="btn" type="submit" id="saveBtn">Save Entry</button>
        </form>
      </div>
      <div class="table-card">
        <h3>${opts.title} Records Log</h3>
        <div class="tbl-wrap">
          <table>
            <thead><tr>${opts.columns.map(c=>`<th>${c.label}</th>`).join('')}<th></th></tr></thead>
            <tbody id="recordsBody"><tr><td colspan="${opts.columns.length+1}" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  const form = document.getElementById('entryForm');
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const data = {};
    opts.fields.forEach(f=>{
      const el = form.querySelector(`[name="${f.name}"]`);
      data[f.name] = f.type==='number' ? Number(el.value) : el.value;
    });
    try{
      await addRecord(opts.store, data);
      showToast(opts.title + ' saved live ✓');
      form.reset();
      opts.fields.forEach(f=>{ if(f.type==='date'){ form.querySelector(`[name="${f.name}"]`).value = todayStr(); }});
      loadRows();
    }catch(err){ showToast('Connection dropped', true); }
    btn.disabled = false; btn.textContent = 'Save Entry';
  });

  async function loadRows(){
    const rows = await getAll(opts.store);
    const tbody = document.getElementById('recordsBody');
    if(!rows.length){
      tbody.innerHTML = `<tr><td colspan="${opts.columns.length+1}" class="empty">No records found.</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r=>`
      <tr>
        ${opts.columns.map(c=> `<td>${c.render ? c.render(r) : (r[c.key] ?? '-')}</td>`).join('')}
        <td><button class="del-btn general-remove-btn" data-id="${r.id}">✕</button></td>
      </tr>
    `).join('');
    tbody.querySelectorAll('.general-remove-btn').forEach(b=>{
      b.addEventListener('click', async ()=>{
        try{
          await deleteRecord(opts.store, b.dataset.id);
          showToast('Record removed successfully');
          loadRows();
        }catch(err){ showToast('Execution failed', true); }
      });
    });
  }
  loadRows();
  opts.fields.forEach(f=>{
    if(f.type==='date'){
      const el = form.querySelector(`[name="${f.name}"]`);
      if(el) el.value = todayStr();
    }
  });
}

function fieldHTML(f){
  if(f.type==='select'){
    return `<label>${f.label}</label><select name="${f.name}" ${f.required?'required':''}>
      ${f.options.map(o=>`<option value="${o}">${o}</option>`).join('')}
    </select>`;
  }
  return `<label>${f.label}</label><input type="${f.type}" name="${f.name}" ${f.required?'required':''} ${f.step?`step="${f.step}"`:''} placeholder="${f.placeholder||''}">`;
}

/* ---------- PRODUCTION PANEL ---------- */
function renderProduction(root){

  let sizeOptionsHTML = SIZE_OPTIONS.map(sz => `<option value="${sz}">${sz}</option>`).join('');
  
  root.innerHTML = `
    <div class="panel-grid with-form">
      <div class="form-card">
        <h3>Add Production Batch</h3>
        <form id="entryForm">
          <label>Date</label>
          <input type="date" name="date" required>

          <label>Product / Flavor</label>
          <select name="product" required>
            ${flavorOptionsHTML}
          </select>

          <label>Bottle Size</label>
          <select name="size" required>
            ${sizeOptionsHTML}
          </select>

          <label>Production Line</label>
          <input type="text" name="line" required placeholder="e.g. Line 2">

          <label>Units Produced</label>
          <input type="number" name="qty" required>

          <label>Wastage (units)</label>
          <input type="number" name="wastage">

          <label>Shift Supervisor</label>
          <input type="text" name="supervisor" placeholder="e.g. Ali Raza">

          <button class="btn" type="submit" id="saveBtn">Save Entry</button>
        </form>
      </div>
      <div class="table-card">
        <h3>Production Records Log</h3>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Size</th>
                <th>Line</th>
                <th>Units</th>
                <th>Wastage</th>
                <th>Supervisor</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recordsBody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const form = document.getElementById('entryForm');
  form.querySelector('[name="date"]').value = todayStr();

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const data = {
      date: form.querySelector('[name="date"]').value,
      product: form.querySelector('[name="product"]').value,
      size: form.querySelector('[name="size"]').value,
      line: form.querySelector('[name="line"]').value,
      qty: Number(form.querySelector('[name="qty"]').value),
      wastage: Number(form.querySelector('[name="wastage"]').value) || 0,
      supervisor: form.querySelector('[name="supervisor"]').value
    };
    try{
      await addRecord('production', data);
      showToast('Production saved live ✓');
      form.reset();
      form.querySelector('[name="date"]').value = todayStr();
      loadRows();
    }catch(err){ showToast('Sync failed', true); }
    btn.disabled = false; btn.textContent = 'Save Entry';
  });

  async function loadRows(){
    const rows = await getAll('production');
    const tbody = document.getElementById('recordsBody');
    if(!rows.length){
      tbody.innerHTML = `<tr><td colspan="8" class="empty">No records found.</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r=>`
      <tr>
        <td>${r.date || '-'}</td>
        <td style="font-weight:600;">${r.product || '-'}</td>
        <td><b>${r.size || '-'}</b></td>
        <td>${r.line || '-'}</td>
        <td>${Number(r.qty).toLocaleString()}</td>
        <td>${r.wastage || 0}</td>
        <td>${r.supervisor || '-'}</td>
        <td><button class="del-btn general-remove-btn" data-id="${r.id}">✕</button></td>
      </tr>
    `).join('');
    tbody.querySelectorAll('.general-remove-btn').forEach(b=>{
      b.addEventListener('click', async ()=>{
        try{
          await deleteRecord('production', b.dataset.id);
          showToast('Record deleted');
          loadRows();
        }catch(err){ showToast('Execution failed', true); }
      });
    });
  }
  loadRows();
}
