<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FizzWorks — Factory Control (Online)</title>
<style>
  :root{
    --navy:#0E2C33;
    --navy-deep:#081B20;
    --lime:#C8E84B;
    --orange:#FF7A33;
    --cream:#F5F1E6;
    --teal-card:#15414A;
    --teal-line:#235965;
    --red:#E5564A;
    --font-display: 'Archivo Black', Arial, sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--font-body);
    background: var(--navy-deep);
    color: var(--cream);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  ::selection{ background: var(--lime); color: var(--navy-deep); }

  .app{ display:flex; min-height:100vh; }
  .sidebar{
    width: 220px;
    background: var(--navy);
    border-right: 1px solid var(--teal-line);
    padding: 24px 14px;
    position: sticky; top:0; height:100vh;
    flex-shrink:0;
    display:flex; flex-direction:column;
    transition: transform .25s ease;
    z-index: 50;
  }
  .brand{
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--lime);
    padding: 0 10px 22px 10px;
    border-bottom: 1px solid var(--teal-line);
    margin-bottom: 18px;
  }
  .brand span{ color: var(--cream); display:block; font-family: var(--font-body); font-weight:600; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:.6; margin-top:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 11px 12px; border-radius: 10px;
    color: var(--cream); opacity:.75;
    cursor:pointer; font-weight:600; font-size:14px;
    margin-bottom: 4px;
    border:none; background:none; width:100%; text-align:left;
    font-family: var(--font-body);
  }
  .nav-item .ic{ width:18px; text-align:center; font-size:15px; }
  .nav-item:hover{ opacity:1; background: var(--teal-card); }
  .nav-item.active{ opacity:1; background: var(--lime); color: var(--navy-deep); }
  .sidebar-foot{ margin-top:auto; font-size:11px; opacity:.6; padding:10px; line-height:1.6; }
  .dot{ width:7px; height:7px; border-radius:50%; background: var(--lime); display:inline-block; margin-right:5px;}
  .dot.off{ background: var(--red); }

  .main{ flex:1; padding: 28px 32px 60px; max-width: 1180px; }
  .topbar{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 26px; gap:16px; flex-wrap:wrap;}
  .topbar h1{ font-family: var(--font-display); font-size: 26px; letter-spacing:-0.5px;}
  .topbar p{ opacity:.6; font-size:13px; margin-top:4px;}
  .menu-btn{ display:none; background:var(--teal-card); border:1px solid var(--teal-line); color:var(--cream); padding:8px 12px; border-radius:8px; font-size:18px; cursor:pointer;}
  .sync-pill{ font-size:11px; padding:6px 11px; border-radius:20px; background: var(--teal-card); border:1px solid var(--teal-line); display:inline-flex; align-items:center; gap:6px; font-weight:600;}

  .grid-cards{ display:grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap:14px; margin-bottom:28px; }
  .card{
    background: var(--teal-card); border:1px solid var(--teal-line); border-radius:14px;
    padding:18px; cursor:pointer; transition: transform .15s ease, border-color .15s ease;
    position:relative; overflow:hidden;
  }
  .card:hover{ transform: translateY(-2px); border-color: var(--lime); }
  .card .label{ font-size:11px; text-transform:uppercase; letter-spacing:1.2px; opacity:.6; font-weight:600;}
  .card .value{ font-family: var(--font-display); font-size:28px; margin-top:8px; }
  .card .sub{ font-size:12px; opacity:.55; margin-top:4px; font-family: 'DM Mono', monospace;}
  .card .accent-bar{ position:absolute; left:0; top:0; bottom:0; width:4px; }

  .section-title{ font-family: var(--font-display); font-size:15px; letter-spacing:.3px; margin: 30px 0 12px; display:flex; align-items:center; gap:8px;}
  
  .panel-grid{ display:grid; grid-template-columns: 1fr; gap:18px; }
  @media(min-width:920px){ .panel-grid.with-form{ grid-template-columns: 380px 1fr; } }

  .form-card, .table-card{
    background: var(--teal-card); border:1px solid var(--teal-line); border-radius:14px; padding:20px;
  }
  .form-card h3, .table-card h3{ font-family: var(--font-display); font-size:14px; margin-bottom:14px; letter-spacing:.3px;}
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.8px; opacity:.6; margin: 12px 0 5px; font-weight:600;}
  label:first-of-type{ margin-top:0; }
  input, select{
    width:100%; padding:10px 11px; border-radius:8px; border:1px solid var(--teal-line);
    background: var(--navy-deep); color: var(--cream); font-size:14px; font-family: var(--font-body);
  }
  input:focus, select:focus{ outline:none; border-color: var(--lime); }
  .btn{
    margin-top:18px; width:100%; padding:12px; border-radius:9px; border:none;
    background: var(--lime); color: var(--navy-deep); font-weight:700; font-size:14px; cursor:pointer;
    font-family: var(--font-body);
  }
  .btn:disabled{ opacity:.6; cursor:wait; }
  .btn:hover:not(:disabled){ filter:brightness(1.08); }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; padding:9px 8px; opacity:.5; text-transform:uppercase; font-size:10.5px; letter-spacing:.8px; border-bottom:1px solid var(--teal-line); font-weight:600;}
  td{ padding:11px 8px; border-bottom:1px solid var(--teal-line); vertical-align: middle; }
  tr:last-child td{ border-bottom:none; }
  .tbl-wrap{ overflow-x:auto; }
  .pill{ padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; display: inline-block; text-align: center; }
  .pill.ok{ background: rgba(200,232,75,.18); color: var(--lime); }
  .pill.low{ background: rgba(229,86,74,.18); color: var(--red); }
  .pill.mid{ background: rgba(255,122,51,.18); color: var(--orange); }
  .del-btn{ background:none; border:none; color: var(--red); cursor:pointer; font-size:14px; opacity:.7; padding: 2px 6px; }
  .del-btn:hover{ opacity:1; }
  .adj-btn{ background: var(--navy-deep); border: 1px solid var(--teal-line); color: var(--cream); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 12px; }
  .adj-btn:hover{ border-color: var(--lime); color: var(--lime); }
  .empty{ text-align:center; padding:30px 10px; opacity:.4; font-size:13px;}

  .toast{
    position:fixed; bottom:20px; right:20px; background: var(--lime); color: var(--navy-deep);
    padding:12px 18px; border-radius:10px; font-weight:700; font-size:13px;
    transform: translateY(100px); opacity:0; transition: all .3s ease; z-index:100;
  }
  .toast.show{ transform:translateY(0); opacity:1; }
  .toast.err{ background: var(--red); color: var(--cream); }

  .cart-item-row {
    display: flex !important;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }

  @media(max-width:880px){
    .sidebar{ position:fixed; left:0; transform: translateX(-100%); box-shadow: 10px 0 30px rgba(0,0,0,.4); }
    .sidebar.open{ transform: translateX(0); }
    .menu-btn{ display:inline-block; }
    .main{ padding: 20px 16px 50px; }
  }
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">FIZZWORKS<span>Factory Control · Online</span></div>
    <button class="nav-item active" data-view="dashboard"><span class="ic">◆</span> Dashboard</button>
    <button class="nav-item" data-view="sales"><span class="ic">₨</span> Sales</button>
    <button class="nav-item" data-view="purchase"><span class="ic">⇩</span> Purchase</button>
    <button class="nav-item" data-view="production"><span class="ic">⚙</span> Production</button>
    <button class="nav-item" data-view="vendors"><span class="ic">⬡</span> Vendors</button>
    <button class="nav-item" data-view="stock"><span class="ic">▣</span> Stock</button>
    <button class="nav-item" data-view="salary"><span class="ic">$</span> Salary</button>
    <div class="sidebar-foot"><span class="dot" id="syncDot"></span><span id="syncLabel">Connecting...</span></div>
  </nav>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSub">Live overview of your bottling operation</p>
        </div>
      </div>
      <div class="sync-pill"><span class="dot" id="syncDot2"></span><span id="syncLabel2">Cloud Store</span></div>
    </div>

    <div id="view-root"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase Legacy SDK Core Scripts CDN Hooks -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDiCFZ_UL4ZiTigq3oLiYU10YYN_XFgdq8",
  authDomain: "idc-factry.firebaseapp.com",
  databaseURL: "https://idc-factry-default-rtdb.firebaseio.com",
  projectId: "idc-factry",
  storageBucket: "idc-factry.firebasestorage.app",
  messagingSenderId: "71728674831",
  appId: "1:71728674831:web:c8cec1401858b89ee0b87a",
  measurementId: "G-BH3PZHQREV"
};

firebase.initializeApp(firebaseConfig);
const fireDb = firebase.database();

const STORES = ['sales','purchase','production','vendors','stock','salary'];

const PRODUCT_OPTIONS = [
  "Peach", "Apple", "PineApple", "Lychee", "Imlee", "Lemon", 
  "Alu Bukhara", "Blu Berry", "Ice Soda", "Guava", "Mint", 
  "Anar", "Strawberry", "Orange", "Falsa", "Milk Soda"
];
const SIZE_OPTIONS = ["Cylinder", "Buddy", "1.5L"];

function setSyncStatus(ok) {
  document.querySelectorAll('.dot').forEach(d => d.classList.toggle('off', !ok));
  document.getElementById('syncLabel').textContent = ok ? 'Synced Live — Cloud Connected' : 'Offline Mode — Reconnecting';
  document.getElementById('syncLabel2').textContent = ok ? 'Online · Live' : 'Offline';
}

fireDb.ref(".info/connected").on("value", (snap) => {
  setSyncStatus(snap.val() === true);
});

async function addRecord(store, data) {
  const ref = fireDb.ref(store).push();
  data.id = ref.key;
  await ref.set(data);
  return data.id;
}

async function updateRecord(store, id, data) {
  await fireDb.ref(`${store}/${id}`).update(data);
}

async function deleteRecord(store, id) {
  await fireDb.ref(`${store}/${id}`).remove();
}

async function getAll(store) {
  try {
    const snap = await fireDb.ref(store).once('value');
    const val = snap.val();
    if (!val) return [];
    return Object.keys(val).map(key => {
      const item = val[key];
      if (typeof item === 'object' && item !== null) {
        item.id = key;
        return item;
      }
      return { id: key, value: item };
    }).sort((a,b) => (b.id || '').localeCompare(a.id || ''));
  } catch (e) {
    return [];
  }
}

const fmt = n => 'Rs ' + Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0});
const todayStr = ()=> new Date().toISOString().slice(0,10);

function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function statusPill(status) {
  let cls = 'mid';
  if(status === 'Paid' || status === 'Active' || status === 'IN' || status === 'Normal') cls = 'ok';
  if(status === 'Pending' || status === 'Low' || status === 'OUT' || status === 'Out of Stock') cls = 'low';
  return `<span class="pill ${cls}">${status || 'Pending'}</span>`;
}

const titles = {
  dashboard: ['Dashboard','Live overview of your bottling operation'],
  sales: ['Sales','Record and track customer orders & dispatch'],
  purchase: ['Purchase','Raw material & packaging procurement'],
  production: ['Production','Daily batch output by flavor / line'],
  vendors: ['Vendors','Suppliers and outstanding balances'],
  stock: ['Stock','Real-time balanced inventory transactions ledger'],
  salary: ['Salary','Staff wages and payment history']
};

document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    document.getElementById('pageTitle').textContent = titles[v][0];
    document.getElementById('pageSub').textContent = titles[v][1];
    render(v);
    document.getElementById('sidebar').classList.remove('open');
  });
});

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

async function render(view){
  const root = document.getElementById('view-root');
  root.innerHTML = '<div class="empty">Loading current snapshot…</div>';
  if(view==='dashboard') return renderDashboard(root);
  if(view==='sales') return renderSales(root);
  if(view==='purchase') return renderPurchase(root);
  if(view==='production') return renderProduction(root);
  if(view==='vendors') return renderVendors(root);
  if(view==='stock') return renderStock(root);
  if(view==='salary') return renderSalary(root);
}

/* ---------- DASHBOARD SYSTEM ---------- */
async function renderDashboard(root){
  const [sales, purchase, production, vendors, stock, salary] = await Promise.all(STORES.map(getAll));
  const todaySales = sales.filter(s=>s.date===todayStr()).reduce((a,b)=>a+Number(b.amount||0),0);
  const todayProd = production.filter(p=>p.date===todayStr()).reduce((a,b)=>a+Number(b.qty||0),0);
  const pendingPurchase = purchase.filter(p=>p.status!=='Paid').reduce((a,b)=>a+Number(b.amount||0),0);
  const totalSalaryDue = salary.filter(s=>s.status!=='Paid').reduce((a,b)=>a+Number(b.amount||0),0);
  const vendorBalance = vendors.reduce((a,b)=>a+Number(b.balance||0),0);

  const stockBalances = {};
  stock.forEach(t => {
    const item = t.itemName;
    if(!stockBalances[item]) stockBalances[item] = 0;
    if(t.type === 'IN') stockBalances[item] += Number(t.qty || 0);
    if(t.type === 'OUT') stockBalances[item] -= Number(t.qty || 0);
  });
  const uniqueItemsCount = Object.keys(stockBalances).length;

  root.innerHTML = `
    <div class="grid-cards">
      ${card('lime',"Today's Sales", fmt(todaySales), sales.length+' orders logged', 'sales')}
      ${card('orange','Production Today', todayProd.toLocaleString()+' units', production.length+' batches logged', 'production')}
      ${card('red','Pending Purchases', fmt(pendingPurchase), purchase.length+' records', 'purchase')}
      ${card('lime','Active Stock items', uniqueItemsCount, 'Ledger tracks live balances', 'stock')}
      ${card('orange','Salary Due', fmt(totalSalaryDue), salary.length+' records', 'salary')}
      ${card('lime','Vendor Balance', fmt(vendorBalance), vendors.length+' suppliers', 'vendors')}
    </div>
  `;

  root.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => {
      const targetView = c.dataset.go;
      const navBtn = document.querySelector(`.nav-item[data-view="${targetView}"]`);
      if(navBtn) navBtn.click();
    });
  });
}

function card(color,label,value,sub,go){
  return `<div class="card" data-go="${go}">
    <div class="accent-bar" style="background:var(--${color})"></div>
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

/* ---------- SALES MODULE ---------- */
async function renderSales(root) {
  root.innerHTML = `
    <div class="panel-grid with-form">
      <div class="form-card">
        <h3>Record Invoice Entry</h3>
        <form id="salesForm">
          <label>Date</label>
          <input type="date" name="date" required>
          <label>Customer Name</label>
          <input type="text" name="customer" required placeholder="Customer name">
          <div style="background: var(--navy-deep); border: 1px solid var(--teal-line); padding: 12px; border-radius: 8px; margin-top: 12px;">
            <span style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--lime); display: block; margin-bottom: 8px;">Order Cart</span>
            <div id="cartList" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;"></div>
            <button type="button" class="btn" id="addCartRowBtn" style="margin-top: 0; padding: 6px 10px; font-size: 12px; background: transparent; border: 1px dashed var(--lime); color: var(--lime); width:100%;">+ Add Line Item</button>
          </div>
          <label>Grand Total Amount (Rs)</label>
          <input type="number" id="salesInvoiceTotal" required readonly style="background: rgba(255,255,255,0.05); color: var(--lime); font-weight: bold;" placeholder="0">
          <label>Payment Status</label>
          <select name="status" required><option value="Paid">Paid</option><option value="Pending">Pending</option></select>
          <button class="btn" type="submit" id="salesSaveBtn">Save Sale Order</button>
        </form>
      </div>
      <div class="table-card">
        <h3>Sales Records</h3>
        <div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody id="salesTableBody"></tbody></table></div>
      </div>
    </div>
  `;

  const form = document.getElementById('salesForm');
  const cartList = document.getElementById('cartList');
  const addCartRowBtn = document.getElementById('addCartRowBtn');
  const invoiceTotalInput = document.getElementById('salesInvoiceTotal');

  form.querySelector('[name="date"]').value = todayStr();

  function calculateCartTotal() {
    let grandTotal = 0;
    cartList.querySelectorAll('.cart-item-row').forEach(row => {
      const rate = Number(row.querySelector('.cart-rate').value) || 0;
      const qty = Number(row.querySelector('.cart-qty').value) || 0;
      grandTotal += (rate * qty);
    });
    invoiceTotalInput.value = grandTotal;
  }

  function addCartRow() {
    const row = document.createElement('div');
    row.className = 'cart-item-row';
    
    let flavorOptions = PRODUCT_OPTIONS.map(f => `<option value="${f}">${f}</option>`).join('');
    let sizeOptions = SIZE_OPTIONS.map(s => `<option value="${s}">${s}</option>`).join('');

    row.innerHTML = `
      <select class="cart-flavor" style="flex:2; padding:6px; min-width:80px;">${flavorOptions}</select>
      <select class="cart-size" style="flex:1.5; padding:6px; min-width:70px;">${sizeOptions}</select>
      <input type="number" class="cart-qty" placeholder="Qty" min="1" required style="flex:1; padding:6px; text-align:center; min-width:50px;">
      <input type="number" class="cart-rate" placeholder="Rate" min="0" required style="flex:1.2; padding:6px; text-align:center; min-width:60px;">
      <button type="button" class="del-btn remove-cart-row" style="padding:4px;">✕</button>
    `;

    row.querySelector('.remove-cart-row').addEventListener('click', () => {
      row.remove();
      calculateCartTotal();
    });

    row.querySelector('.cart-qty').addEventListener('input', calculateCartTotal);
    row.querySelector('.cart-rate').addEventListener('input', calculateCartTotal);

    cartList.appendChild(row);
  }

  addCartRowBtn.addEventListener('click', addCartRow);
  addCartRow(); // Start with one initial dynamic cart row element

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rows = cartList.querySelectorAll('.cart-item-row');
    if(!rows.length) return alert('Your order cart is empty.');

    const saveBtn = document.getElementById('salesSaveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving Invoice...';

    let itemsDescription = [];
    rows.forEach(r => {
      const flav = r.querySelector('.cart-flavor').value;
      const size = r.querySelector('.cart-size').value;
      const qty = r.querySelector('.cart-qty').value;
      itemsDescription.push(`${flav} ${size} (x${qty})`);
    });

    const payload = {
      date: form.querySelector('[name="date"]').value,
      customer: form.querySelector('[name="customer"]').value.trim(),
      items: itemsDescription.join(', '),
      amount: Number(invoiceTotalInput.value),
      status: form.querySelector('[name="status"]').value
    };

    try {
      await addRecord('sales', payload);
      showToast('Sale Invoice compiled successfully ✓');
      form.reset();
      cartList.innerHTML = '';
      addCartRow();
      form.querySelector('[name="date"]').value = todayStr();
      invoiceTotalInput.value = 0;
      await refreshSalesTable();
    } catch(err) {
      showToast('Error syncing sales database', true);
    }
    saveBtn.disabled = false; saveBtn.textContent = 'Save Sale Order';
  });

  async function refreshSalesTable() {
    const data = await getAll('sales');
    const tbody = document.getElementById('salesTableBody');
    if(!data.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No sales tracked yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(s => `
      <tr>
        <td>${s.date}</td>
        <td style="font-weight:600;">${s.customer}</td>
        <td style="opacity:0.8; font-size:12px; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.items}</td>
        <td style="font-family:'DM Mono'; font-weight:700; color:var(--lime);">${fmt(s.amount)}</td>
        <td>${statusPill(s.status)}</td>
        <td style="text-align:right;"><button class="del-btn remove-sale" data-id="${s.id}">✕</button></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.remove-sale').forEach(b => {
      b.addEventListener('click', async () => {
        if(confirm('Delete this invoice entry permanently?')) {
          await deleteRecord('sales', b.dataset.id);
          showToast('Invoice deleted');
          refreshSalesTable();
        }
      });
    });
  }
  await refreshSalesTable();
}

/* ---------- PURCHASE PANEL ---------- */
function renderPurchase(root){
  root.innerHTML = `<div class="empty">Purchase Module Dashboard Active. Ready for workflow entries.</div>`;
}

/* ---------- PRODUCTION PANEL ---------- */
function renderProduction(root){
  root.innerHTML = `<div class="empty">Production Tracking Active. Raw material consumption engines ready.</div>`;
}

/* ---------- COMPREHENSIVE STOCK MANAGEMENT CORE ENGINE ---------- */
async function renderStock(root) {
  root.innerHTML = `
    <!-- LIVE MATERIAL BALANCES SUMMARY PANEL WITH QUICK INLINE ACTIONS -->
    <div style="margin-bottom: 24px;">
      <div class="table-card" style="background: var(--navy); border-color: var(--lime);">
        <h3 style="color: var(--lime); display:flex; justify-content:space-between; align-items:center;">
          <span>📋 Live Records & Product Inventory Panel</span>
          <span style="font-size:11px; font-family:var(--font-body); color:var(--cream); opacity:0.6;">Single-Line Workspace</span>
        </h3>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Product / Material Name</th>
                <th>Category Classification</th>
                <th style="text-align: center;">In Hand</th>
                <th style="text-align: center;">Remaining</th>
                <th style="text-align: center;">Alert Status</th>
                <th style="text-align: right; padding-right: 20px;">Manual Controls</th>
              </tr>
            </thead>
            <tbody id="balancesSummaryBody">
              <tr><td colspan="6" class="empty">Calculating ledger transaction streams...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ENTRY FORM & INTERACTIVE SEARCH PANELS -->
    <div class="panel-grid with-form">
      <!-- LEFT MODULE: Add Product Stock Form -->
      <div class="form-card">
        <h3>Log Dynamic Stock Entry</h3>
        <form id="stockLedgerForm">
          <label>Movement Date</label>
          <input type="date" name="date" required>

          <label>Item Name / Material Description</label>
          <input type="text" name="itemName" required placeholder="e.g. Sugar, Peach Essence, Empty Bottle Buddy" list="existing-stock-options">
          <datalist id="existing-stock-options"></datalist>

          <label>Category Group</label>
          <select name="category" required>
            <option value="Raw Materials (Sugar, Essence, etc.)">Raw Materials (Sugar, Essence, etc.)</option>
            <option value="Packaging (Bottles, Caps, Cartons)">Packaging (Bottles, Caps, Cartons)</option>
            <option value="Finished Goods (Bottled Drinks)">Finished Goods (Bottled Drinks)</option>
            <option value="Chemicals / Factory Items">Chemicals / Factory Items</option>
          </select>

          <label>Action Flow Direction</label>
          <select name="type" required>
            <option value="IN">Stock IN (+ Influx Purchased / Received)</option>
            <option value="OUT">Stock OUT (- Consumed in Production / Defect)</option>
          </select>

          <label>Quantity Count</label>
          <input type="number" name="qty" required placeholder="0" min="1">

          <label>Audit Notes / Context</label>
          <input type="text" name="notes" placeholder="e.g. Batch 04 production run or Vendor arrivals">

          <button class="btn" type="submit" id="stockSaveBtn">File Stock Adjustment Line</button>
        </form>
      </div>

      <!-- RIGHT MODULE: Search & Monthly Ledger Logs Grid -->
      <div class="table-card" style="display:flex; flex-direction:column; gap:12px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 6px;">
          <h3>Search Product Log History Records</h3>
          <div style="width: 260px;">
            <input type="text" id="stockSearchInput" placeholder="🔍 Search item ledger history...">
          </div>
        </div>

        <!-- Calculated total arrivals metric visibility badge row -->
        <div id="historyTotalPill" style="display: none; background: var(--navy-deep); border: 1px solid var(--teal-line); padding: 10px 14px; border-radius: 8px; font-size: 13px; color: var(--lime); font-weight: 600;">
          Total Volume Arrived for "<span id="searchedItemLabel" style="color: var(--cream);"></span>" This Month: <span id="searchedItemTotal" style="font-family: 'DM Mono', monospace; font-size: 14px; font-weight: bold; float: right;">0</span>
        </div>

        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Item Details</th>
                <th>Category</th>
                <th>Direction</th>
                <th>Quantity</th>
                <th>Audit Context Note</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ledgerHistoryBody">
              <tr><td colspan="7" class="empty">Loading ledger streams...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const ledgerForm = document.getElementById('stockLedgerForm');
  const searchInput = document.getElementById('stockSearchInput');
  const datalist = document.getElementById('existing-stock-options');
  ledgerForm.querySelector('[name="date"]').value = todayStr();

  let allTransactions = [];

  // Submit action logic to record to Firebase Realtime Store
  ledgerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById('stockSaveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Filing Entry...';

    const payload = {
      date: ledgerForm.querySelector('[name="date"]').value,
      itemName: ledgerForm.querySelector('[name="itemName"]').value.trim(),
      category: ledgerForm.querySelector('[name="category"]').value,
      type: ledgerForm.querySelector('[name="type"]').value,
      qty: Number(ledgerForm.querySelector('[name="qty"]').value),
      notes: ledgerForm.querySelector('[name="notes"]').value || "Manual inventory allocation update"
    };

    try {
      await addRecord('stock', payload);
      showToast('Movement line stored safely ✓');
      ledgerForm.reset();
      ledgerForm.querySelector('[name="date"]').value = todayStr();
      await updateStockViewData();
    } catch (err) {
      showToast('Network synchronization error', true);
    }
    saveBtn.disabled = false; saveBtn.textContent = 'File Stock Adjustment Line';
  });

  // Dynamic monitoring on the input field for real-time history filters
  searchInput.addEventListener('input', () => {
    renderLedgerHistoryRows(allTransactions, searchInput.value.trim());
  });

  async function updateStockViewData() {
    allTransactions = await getAll('stock');
    
    // Auto-update standard select datalist options dynamically
    const uniqueNames = [...new Set(allTransactions.map(t => t.itemName))];
    datalist.innerHTML = uniqueNames.map(name => `<option value="${name}"></option>`).join('');

    calculateBalancesSummary(allTransactions);
    renderLedgerHistoryRows(allTransactions, searchInput.value.trim());
  }

  function calculateBalancesSummary(transactions) {
    const summaryTbody = document.getElementById('balancesSummaryBody');
    if (!transactions.length) {
      summaryTbody.innerHTML = `<tr><td colspan="6" class="empty">No inventory balances configured. Log an adjustment to initialize.</td></tr>`;
      return;
    }

    const computedBalances = {};
    // Calculate values based on chronological stream calculation
    [...transactions].reverse().forEach(t => {
      const name = t.itemName;
      if (!computedBalances[name]) {
        computedBalances[name] = { name: name, category: t.category, inHand: 0, remaining: 0 };
      }
      if (t.type === 'IN') {
        computedBalances[name].inHand += Number(t.qty || 0);
        computedBalances[name].remaining += Number(t.qty || 0);
      } else if (t.type === 'OUT') {
        computedBalances[name].remaining -= Number(t.qty || 0);
      }
    });

    // Generate strict single-line workspace layout framework
    summaryTbody.innerHTML = Object.values(computedBalances).map(b => {
      let statusStr = "Normal";
      if(b.remaining <= 0) statusStr = "Out of Stock";
      else if (b.remaining < 50) statusStr = "Low";

      return `
        <tr>
          <td style="font-weight: 700; color: var(--cream);">${b.name}</td>
          <td style="opacity: 0.7; font-size: 12px;">${b.category || 'Raw Materials'}</td>
          <td style="text-align: center; font-family: 'DM Mono'; font-weight:600; opacity:0.8;">${b.inHand.toLocaleString()}</td>
          <td style="text-align: center; font-family: 'DM Mono'; font-size: 14px; font-weight: bold; color: var(--lime);">${b.remaining.toLocaleString()}</td>
          <td style="text-align: center;">${statusPill(statusStr)}</td>
          <td style="text-align: right; padding-right: 10px; white-space:nowrap;">
            <button class="adj-btn quick-adj" data-item="${b.name}" data-cat="${b.category}" data-type="OUT">-</button>
            <button class="adj-btn quick-adj" data-item="${b.name}" data-cat="${b.category}" data-type="IN">+</button>
          </td>
        </tr>
      `;
    }).join('');

    // Bind event hooks to the fast inline update +/- keys
    summaryTbody.querySelectorAll('.quick-adj').forEach(btn => {
      btn.addEventListener('click', async () => {
        const itemName = btn.dataset.item;
        const category = btn.dataset.cat;
        const type = btn.dataset.type;

        const val = prompt(`Enter quantity to adjust ${type === 'IN' ? 'UP (+)' : 'DOWN (-)'} for "${itemName}":`);
        const parsedQty = parseInt(val, 10);
        if (isNaN(parsedQty) || parsedQty <= 0) return;

        const quickPayload = {
          date: todayStr(),
          itemName: itemName,
          category: category,
          type: type,
          qty: parsedQty,
          notes: `Quick inline adjustment floor control`
        };

        try {
          await addRecord('stock', quickPayload);
          showToast('Adjustment appended ✓');
          await updateStockViewData();
        } catch (err) {
          showToast('Failed to apply update', true);
        }
      });
    });
  }

  function renderLedgerHistoryRows(transactions, filterTerm) {
    const historyTbody = document.getElementById('ledgerHistoryBody');
    const totalPill = document.getElementById('historyTotalPill');
    const labelSpan = document.getElementById('searchedItemLabel');
    const totalSpan = document.getElementById('searchedItemTotal');

    let filtered = transactions;
    if (filterTerm) {
      filtered = transactions.filter(t => 
        t.itemName.toLowerCase().includes(filterTerm.toLowerCase()) ||
        (t.notes && t.notes.toLowerCase().includes(filterTerm.toLowerCase()))
      );
    }

    if (!filtered.length) {
      historyTbody.innerHTML = `<tr><td colspan="7" class="empty">No matching history matches found.</td></tr>`;
      totalPill.style.display = "none";
      return;
    }

    // Render table row items
    historyTbody.innerHTML = filtered.map(t => `
      <tr>
        <td>${t.date}</td>
        <td style="font-weight:600; color:var(--lime);">${t.itemName}</td>
        <td style="opacity:0.7; font-size:11px;">${t.category ? t.category.split(' ')[0] : 'General'}</td>
        <td>${statusPill(t.type)}</td>
        <td style="font-family:'DM Mono'; font-weight:700;">${Number(t.qty).toLocaleString()}</td>
        <td style="opacity:0.8; font-size:12px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${t.notes || ''}">${t.notes || ''}</td>
        <td style="text-align:right;"><button class="del-btn remove-stock" data-id="${t.id}">✕</button></td>
      </tr>
    `).join('');

    // Process tracking math calculations for arrivals badge logic
    if (filterTerm) {
      const activeMonth = todayStr().substring(0, 7); // e.g. "2026-07"
      const dynamicTotal = filtered
        .filter(t => t.type === 'IN' && t.date.startsWith(activeMonth))
        .reduce((sum, current) => sum + Number(current.qty || 0), 0);

      labelSpan.textContent = filterTerm;
      totalSpan.textContent = dynamicTotal.toLocaleString();
      totalPill.style.display = "block";
    } else {
      totalPill.style.display = "none";
    }

    // Attach deletion monitors
    historyTbody.querySelectorAll('.remove-stock').forEach(b => {
      b.addEventListener('click', async () => {
        if (confirm('Delete this transactional entry permanently? Balance metrics will recompute.')) {
          await deleteRecord('stock', b.dataset.id);
          showToast('Ledger trace removed');
          await updateStockViewData();
        }
      });
    });
  }

  // Load database arrays on display runtime initialization
  await updateStockViewData();
}

/* ---------- VENDORS PANEL ---------- */
function renderVendors(root){
  root.innerHTML = `<div class="empty">Vendors Registry Active. Data streams operating normally.</div>`;
}

/* ---------- SALARY PANEL ---------- */
function renderSalary(root){
  root.innerHTML = `<div class="empty">Wages Tracking Module Operational. Ledger engine online.</div>`;
}

// Global initialization entry points
render('dashboard');
</script>
</body>
</html>
